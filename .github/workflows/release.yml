name: Release

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 02:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if image exists'
        required: false
        type: boolean
        default: false

permissions: read-all

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: Detect Zabbix Versions
        id: detect
        run: ./.github/scripts/detect-version.sh 7.0.0

  build-release:
    needs: detect-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Check if image exists
        id: check_image
        if: github.event_name == 'schedule' || inputs.force_rebuild != true
        run: |
          # Simple check to see if tag exists in GHCR
          # Logic to be implemented or use a simple docker manifest inspect
          echo "Checking if image exists for version ${{ matrix.version }}"
          # For now, we assume we proceed, or implement actual check
          echo "exists=false" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          build-args: |
            ZABBIX_VERSION=ubuntu-${{ matrix.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ matrix.version }}
          name: "v${{ matrix.version }}"
          generate_release_notes: true

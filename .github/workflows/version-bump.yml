name: Version Bump

on:
  workflow_dispatch:
    inputs:
      part:
        description: 'Version part to bump (major, minor, patch)'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      message:
        description: 'Commit message'
        required: false
        default: 'Bump version'
      tag:
        description: 'Create a version tag'
        required: false
        type: boolean
        default: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            # We need write access to push the commit
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install bump-my-version
        run: |
          python -m pip install --upgrade bump-my-version
      - name: Bump version
        run: |
          bump2version ${{ github.event.inputs.part }} --verbose
      - name: Get new version
        id: version
        run: |
          echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT
      - name: Commit files
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add VERSION
          git commit -m "${{ github.event.inputs.message }}: ${{
          github.event.inputs.part }} to ${{
          steps.version.outputs.VERSION }}"
      - name: Push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
      - name: Create tag
        if: github.event.inputs.tag == 'true'
        run: |
          git tag v${{
          steps.version.outputs.VERSION }}
          git push origin v${{
          steps.version.outputs.VERSION }}

